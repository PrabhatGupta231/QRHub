; QRHub — Production PHP Configuration
; Place in: .docker/php/production.ini (copied to /usr/local/etc/php/conf.d/ by Dockerfile)

[PHP]
; Memory & Upload Limits
memory_limit = 256M
post_max_size = 25M
upload_max_filesize = 25M
max_execution_time = 60
max_input_time = 60
max_input_vars = 2000

; Expose PHP
expose_php = Off

; Error Handling (production: log only, don't display)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; OPcache — essential for production performance
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 20000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 0
opcache.fast_shutdown = 1
opcache.jit_buffer_size = 256M
opcache.jit = tracing

; Session Security
session.use_strict_mode = 1
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = Lax

; Timezone
date.timezone = UTC
