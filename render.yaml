services:
  # ============================================================
  # Web Service — PHP Laravel (Render)
  # ============================================================
  - type: web
    name: qrhub
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: QRHub
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        fromService:
          type: web
          name: qrhub
          property: host
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: qrhub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: qrhub-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: qrhub-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: qrhub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: qrhub-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: SESSION_SECURE_COOKIE
        value: true
      - key: FILESYSTEM_DISK
        value: local
      # Set to true on first deploy only, then change to false
      - key: FIRST_SETUP
        value: false
      - key: ADMIN_EMAIL
        value: admin@qrhub.com
      - key: ADMIN_PASSWORD
        value: ChangeMe123!
      - key: BCRYPT_ROUNDS
        value: 12

  # ============================================================
  # Database — MySQL (Render)
  # ============================================================
databases:
  - name: qrhub-db
    databaseName: qrhub
    user: qrhub_user
    plan: starter
