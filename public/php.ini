; QRHub — Shared Hosting PHP Configuration
; Rename to php.ini and place in the same directory as index.php (public/)
; Works on cPanel-based hosts, InfinityFree, Hostinger, and similar

[PHP]
memory_limit = 256M
post_max_size = 25M
upload_max_filesize = 25M
max_execution_time = 60
max_input_vars = 2000

; Production error display (never show errors publicly)
display_errors = Off
log_errors = On

; OPcache (if supported by host)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 60

; Security
expose_php = Off
session.cookie_httponly = 1

; Timezone
date.timezone = UTC
